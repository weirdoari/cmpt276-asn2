<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <main class = "container-fluid">
        <div class = "row justify-content-center">
            <div class="col-md-4">
                <h1>All Users</h1>
                <ul>
                    <li th:each="user : ${users}">
                        <img th:if="${user.imgLink != ''}"
                             th:src="${user.imgLink}"
                             th:alt="${user.name}"
                             style="width:80px; height:80px; object-fit:cover; margin-right:8px; display:inline-block; vertical-align:middle;" />
                        <strong th:text="${user.name}">User Name</strong><br/>
                        <span th:switch="${#strings.contains(user.mail, '@')}">
                            <span th:case="true" th:text="${user.mail}">email</span>
                            <span th:case="false">Email Hidden</span>
                        </span> <br>
                        <span th:text="${user.roleType}">role</span>
                    </li>
                </ul>
            </div>
        </div>
    </main>
</body>
</html>
